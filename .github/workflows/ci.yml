name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run verify
      - run: npm run test:browser
        env:
          CHROME_BIN: /usr/bin/google-chrome
          REQUIRE_BROWSER: 1
