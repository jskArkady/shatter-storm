<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Shatter Storm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-shell">
        <canvas id="scene3d" aria-hidden="true"></canvas>
        <canvas id="scene3d-gameplay" aria-hidden="true"></canvas>
        <canvas
            id="game"
            role="application"
            tabindex="0"
            aria-label="Shatter Storm game. Move the paddle with the mouse, touch, Left and Right arrows, or A and D. Press Space or click to shoot."
        >Shatter Storm requires a browser with HTML canvas support.</canvas>
        <canvas id="scene3d-overlay" aria-hidden="true"></canvas>
    </div>
    <script src="vendor/three.min.js"></script>
    <script src="game-rules.js"></script>
    <script src="three-renderer.js"></script>
    <script src="game.js"></script>
</body>
</html>
